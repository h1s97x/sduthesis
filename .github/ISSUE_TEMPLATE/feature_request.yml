name: 功能请求
description: 建议新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请描述你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 当前有什么不便或缺失的功能？
      placeholder: "比如：我想调整行距但 SDUSetup 不支持"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望怎样解决？
      placeholder: "比如：SDUSetup 增加 lineSpread 键"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - SDUSetup 配置扩展
        - 新模块（研究生/盲审等）
        - 排版样式改进
        - 文档/使用手册
        - CI/构建工具
        - 其他
    validations:
      required: true
