name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build LaTeX document
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: TeX-Live/setup-texlive-action@v4
        with:
          version: 2025
          package-file: |
            .github/tl_packages

      - name: Link fonts for XeTeX
        run: |
          mkdir -p ~/.fonts
          ln -s $(kpsewhich -var-value=TEXMFDIST)/fonts/ ~/.fonts/texmf-dist-fonts

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build PDF
        run: just build
        env:
          TEXINPUTS: ".:modules//:"

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: main.pdf
          path: main.pdf
          retention-days: 30
