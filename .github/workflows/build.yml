name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build LaTeX document
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: TeX-Live/setup-texlive-action@v4
        with:
          version: 2025
          package-file: |
            .github/tl_packages

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build PDF
        run: just build

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: main.pdf
          path: main.pdf
          retention-days: 30
