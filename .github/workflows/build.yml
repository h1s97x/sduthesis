name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build (TeX Live ${{ matrix.texlive-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        texlive-version: ["2024", "2025"]
    steps:
      - uses: actions/checkout@v6

      - uses: TeX-Live/setup-texlive-action@v4
        with:
          version: ${{ matrix.texlive-version }}
          package-file: |
            .github/tl_packages

      - name: Link fonts for XeTeX
        run: |
          mkdir -p ~/.fonts
          ln -s $(kpsewhich -var-value=TEXMFDIST)/fonts/ ~/.fonts/texmf-dist-fonts

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Lint with chktex
        if: matrix.texlive-version == '2025'
        continue-on-error: true
        run: |
          chktex -q -n 1 -n 13 -n 24 -n 36 sduthesis.cls modules/*.sty 2>/dev/null || true

      - name: Build PDF
        run: just build
        env:
          TEXINPUTS: ".:modules//:"

      - name: Run compile tests
        run: python3 tests/test-compile.py
        env:
          TEXINPUTS: ".:modules//:"

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request' && matrix.texlive-version == '2025'
        with:
          name: main.pdf
          path: main.pdf
          retention-days: 30
