name: Build LaTeX Document

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时时间设为 30 分钟
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install fonts
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            fonts-noto-core \
            fonts-texgyre \
            fonts-freefont-ttf \
            fontconfig
          fc-cache -fv

      - name: Prepare CI environment
        run: |
          # 在 CI 环境中使用开源字体，临时覆盖用户配置
          if [ "$CI" = "true" ]; then
            cat >> config/main/config-main.tex << 'FONTCI'

          % CI 环境字体配置（自动添加）
          \setmainfont{TeX Gyre Termes}
          \setsansfont{TeX Gyre Heros}
          \setmonofont{TeX Gyre Cursor}
          FONTCI
          fi

      # ========== 多次编译流程 ==========
      # 第一次：生成辅助文件 (.aux, .log)
      - name: Compile LaTeX (Pass 1/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error

      # 处理参考文献
      - name: Process bibliography
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace \
            ghcr.io/xu-cheng/texlive-full:latest \
            bash -c "cd /workspace && biber main"

      # 第二次：读取 .aux 和 .bbl，解析引用
      - name: Compile LaTeX (Pass 2/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error

      # 第三次：确保目录、交叉引用完全同步
      - name: Compile LaTeX (Pass 3/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: main.pdf
