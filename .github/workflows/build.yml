name: Build LaTeX Document

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要获取完整历史用于更新 main.pdf
      
      - name: Install fonts
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            fonts-noto-core \
            fonts-texgyre \
            fonts-freefont-ttf \
            fontconfig
          fc-cache -fv

      # ========== 多次编译流程 ==========
      # 第一次：生成辅助文件 (.aux, .log)
      - name: Compile LaTeX (Pass 1/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error

      # 处理参考文献
      - name: Process bibliography
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace \
            ghcr.io/xu-cheng/texlive-full:latest \
            bash -c "cd /workspace && biber main"

      # 第二次：读取 .aux 和 .bbl，解析引用
      - name: Compile LaTeX (Pass 2/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error

      # 第三次：确保目录、交叉引用完全同步
      - name: Compile LaTeX (Pass 3/4)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -synctex=1 -interaction=nonstopmode -halt-on-error
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: main.pdf
          retention-days: 30
      
      # 将 main.pdf 提交回仓库（仅在 push 到 main 时）
      - name: Commit PDF to repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add main.pdf
          git commit -m "docs: 自动更新 main.pdf [skip ci]" || echo "No changes to commit"
          git push
