name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: -shell-escape -interaction=nonstopmode

      - name: Generate changelog
        run: |
          # 下载并安装 git-cliff
          curl -L https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz -o cliff.tar.gz
          tar -xzf cliff.tar.gz
          chmod +x git-cliff-2.4.0/git-cliff
          ./git-cliff-2.4.0/git-cliff --version

          # 生成 changelog
          ./git-cliff-2.4.0/git-cliff > CHANGELOG.md || true
          cat CHANGELOG.md

      - name: Update changelog in repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout main
          git add CHANGELOG.md main.tex main.pdf
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: update files for release [skip ci]"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: main.pdf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
