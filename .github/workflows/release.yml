name: Release

on:
  push:
    tags:
      - 'v*'

# 避免与 build workflow 冲突
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup TeX Live
        uses: TeX-Live/setup-texlive-action@v1
        with:
          update-all-packages: false

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Compile PDF
        run: just build

      - name: Create distribution archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="sduthesis-${VERSION#v}.zip"
          
          # 创建临时目录
          mkdir -p "sduthesis-${VERSION#v}"
          
          # 复制模板文件
          cp main.tex sduthesis.cls sdusetup.tex Makefile justfile
          cp -r config data figures
          
          # 创建 ZIP
          zip -r "$ARCHIVE_NAME" sduthesis-${VERSION#v}
          
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Download git-cliff
        run: |
          curl -sL https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz -o git-cliff.tar.gz
          tar -xzf git-cliff.tar.gz
          chmod +x git-cliff-2.4.0/git-cliff
          sudo mv git-cliff-2.4.0/git-cliff /usr/local/bin/cliff

      - name: Update CHANGELOG
        run: |
          cliff --config cliff.toml --output CHANGELOG.md
          git checkout main
          git add CHANGELOG.md
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "docs: update CHANGELOG.md"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }} main.pdf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
