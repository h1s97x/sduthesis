name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 获取版本号
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # 创建发布包
      - name: Create archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          zip -r sduthesis-$VERSION.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "*.pdf"
          ls -lh *.zip

      # 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sduthesis-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-changelog:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 下载并安装 git-cliff
      - name: Install git-cliff
        run: |
          curl -LO https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz
          sudo mv git-cliff-2.4.0/git-cliff /usr/local/bin/cliff
          cliff --version

      # 生成 CHANGELOG
      - name: Update CHANGELOG
        run: |
          cliff --config cliff.toml --output CHANGELOG.md
          cat CHANGELOG.md

      # 提交并推送
      - name: Commit and push CHANGELOG
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout main
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "docs: update CHANGELOG.md"
          git push origin main
