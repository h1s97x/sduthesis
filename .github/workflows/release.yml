name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ==================== 构建和测试 ====================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: main.pdf
          retention-days: 30

  # ==================== 创建 Release 包 ====================
  create-release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get PDF from artifact
        uses: actions/download-artifact@v4
        with:
          name: main-pdf
          path: .

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "版本: $VERSION"

          # 创建 ZIP 包
          zip -r sduthesis-$VERSION.zip . -x "*.git*" -x "*.github*"

          echo "=== 生成的文件 ==="
          ls -lh *.zip *.pdf

      - name: Upload to Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sduthesis-*.zip
            main.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
