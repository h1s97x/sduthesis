name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - uses: TeX-Live/setup-texlive-action@v4
        with:
          version: 2025
          package-file: |
            .github/tl_packages

      - uses: taiki-e/install-action@v2
        with:
          tool: just, git-cliff

      - name: Build PDF
        run: just build

      - name: Generate changelog
        run: git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Update changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update CHANGELOG.md [skip ci]"
            git push
          fi

      - name: Create ZIP archive
        run: |
          mkdir -p sduthesis
          cp main.tex sduthesis/
          cp -r config/ data/ figures/ sduthesis/
          cp sduthesis.cls sduthesis/
          cp Makefile justfile README.md LICENSE CHANGELOG.md CONTRIBUTING.md sduthesis/
          zip -r sduthesis.zip sduthesis/
          rm -rf sduthesis/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.pdf
            sduthesis.zip
          generate_release_notes: true
